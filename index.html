<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Nexus V60 | Titanium Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --singularity: #00f2ff; --titanium: #e2e8f0; --bg: #030305; --grid: #ffffff03; }
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px; color: #fff; overflow-x: hidden; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .v60-panel { 
            background: linear-gradient(145deg, rgba(13,13,18,0.9) 0%, rgba(5,5,8,0.95) 100%);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 32px; box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8), inset 0 1px 10px rgba(255,255,255,0.03);
        }
        .btn-main { background: var(--titanium); color: #000; font-weight: 900; transition: all 0.3s ease; border: 1px solid transparent; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); background: var(--singularity); }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(1); }
        .terminal { background: #000; height: 130px; overflow-y: auto; font-size: 10px; color: var(--singularity); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .scanning-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--singularity), transparent); width: 0%; box-shadow: 0 0 10px var(--singularity); }
        .rtp-chip { padding: 4px 12px; border-radius: 12px; font-size: 8px; font-weight: 900; letter-spacing: 0.1em; border: 1px solid rgba(255,255,255,0.1); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen" onload="initSystem()">

    <div class="w-full max-w-5xl space-y-6 relative z-10">
        <div class="flex justify-between items-end px-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">Quantum <span class="text-[#00f2ff]">V60</span></h1>
                <div class="flex items-center gap-2 mt-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-[#00f2ff] animate-pulse"></div>
                    <p id="net-display" class="text-[8px] text-zinc-400 font-bold uppercase tracking-widest">Estabelecendo Rota...</p>
                    <div class="rtp-chip bg-zinc-900 text-zinc-400">TITANIUM ENGINE</div>
                </div>
            </div>
            <div id="timer-display" class="mono text-5xl font-black text-zinc-800 tracking-tighter">00:00</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
            <button onclick="registrarFeedback(0)" class="md:col-span-3 bg-red-950/30 border border-red-900/50 p-4 rounded-[20px] text-[9px] font-black uppercase text-red-500 transition hover:bg-red-900/50">Registrar Retenção (-)</button>
            <div class="md:col-span-9 bg-zinc-900/40 border border-zinc-800/50 p-2 rounded-[20px] flex flex-col md:flex-row items-center gap-4 px-6">
                <div class="flex-1 w-full">
                    <p class="text-[8px] text-zinc-500 font-black uppercase mb-1">Calibrar Ciclo de Payout</p>
                    <input id="ciclo-manual" type="number" placeholder="Ciclo exato do ganho..." class="w-full bg-transparent border-none text-lg font-bold mono outline-none text-[#00f2ff]">
                </div>
                <div class="flex gap-2">
                    <button onclick="registrarFeedback(1)" class="bg-emerald-900/30 border border-emerald-800/50 px-5 py-3 rounded-xl text-[9px] font-black text-emerald-400 uppercase hover:bg-emerald-800/50 transition">Win Normal</button>
                    <button onclick="registrarFeedback(2)" class="bg-cyan-900/30 border border-cyan-800/50 px-5 py-3 rounded-xl text-[9px] font-black text-cyan-400 uppercase hover:bg-cyan-800/50 transition">Win Turbo</button>
                </div>
            </div>
        </div>

        <div class="v60-panel p-6 md:p-10 space-y-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full"><div class="scanning-bar" id="scan-bar"></div></div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1"><label class="text-[8px] font-black text-zinc-500 uppercase">Ambiente</label><select id="prov" onchange="atualizarGatewayPorURL()" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-xs mono text-zinc-300 outline-none"><option value="PG">PG Soft Cluster</option><option value="PRAGMATIC">Pragmatic DPI</option></select></div>
                <div class="space-y-1"><label class="text-[8px] font-black text-zinc-600 uppercase">Target Host</label><input id="gateway" type="text" value="Standby..." class="w-full bg-black/50 border border-zinc-800/30 p-4 rounded-xl text-[9px] mono text-zinc-600 outline-none" readonly></div>
                <div class="space-y-1"><label class="text-[8px] font-black text-zinc-500 uppercase">URL do Jogo</label><input id="game-url" type="url" oninput="atualizarGatewayPorURL()" placeholder="Cole o link..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-xs mono text-white outline-none focus:border-[#00f2ff]"></div>
                <div class="space-y-1"><label class="text-[8px] font-black text-zinc-500 uppercase">Capital (R$)</label><input id="bank" type="number" value="100" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-xs mono text-white outline-none focus:border-[#00f2ff]"></div>
            </div>

            <button id="main-btn" onclick="iniciarTitaniumAudit()" class="w-full btn-main py-6 rounded-2xl text-[11px] uppercase tracking-[1em] italic">Análise Quantitativa</button>

            <div id="results" class="hidden space-y-6">
                
                <div class="bg-[#020203] border border-zinc-800 rounded-[32px] p-8 text-center relative shadow-2xl">
                    <div id="break-box" class="hidden mb-6 inline-block px-4 py-2 border border-red-500/30 bg-red-500/10 rounded-lg text-red-500 font-bold mono text-sm animate-pulse">ALTO JITTER DETECTADO</div>
                    
                    <div id="signal" class="text-7xl md:text-[8rem] font-black italic text-white mb-8 leading-none drop-shadow-[0_0_30px_rgba(0,242,255,0.2)]">--</div>
                    
                    <div class="grid grid-cols-3 gap-2 mb-8 bg-zinc-900/30 p-2 rounded-xl border border-zinc-800/50">
                        <div class="text-[8px] font-black text-zinc-400 uppercase"><span id="val-manuais" class="text-lg text-white block mono">0</span> Manuais<br>(Limpeza)</div>
                        <div class="text-[8px] font-black text-[#00f2ff] uppercase border-l border-zinc-800"><span id="val-normais" class="text-lg block mono">0</span> Normais<br>(Ataque)</div>
                        <div class="text-[8px] font-black text-amber-500 uppercase border-l border-zinc-800"><span id="val-turbos" class="text-lg block mono">0</span> Turbos<br>(Finalização)</div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-6 border-t border-zinc-900">
                        <div><span class="text-[8px] text-zinc-600 uppercase font-black block">Confiança</span><div id="accuracy" class="text-xl font-bold mono text-[#00f2ff]">00.0%</div></div>
                        <div><span class="text-[8px] text-zinc-600 uppercase font-black block">Bet Sugerida</span><div id="val-bet" class="text-xl font-bold mono text-white">R$ 0,00</div></div>
                        <div><span class="text-[8px] text-zinc-600 uppercase font-black block">Variância (Jitter)</span><div id="val-jit" class="text-xl font-bold mono text-zinc-400">--</div></div>
                        <div><span class="text-[8px] text-zinc-600 uppercase font-black block">Estado da Rede</span><div id="val-load" class="text-xl font-bold mono">--</div></div>
                    </div>
                </div>
            </div>

            <div id="log" class="terminal p-4 mono leading-relaxed"></div>
        </div>
    </div>

    <script>
        let sessionData = JSON.parse(localStorage.getItem('v60_titanium')) || [];
        let timerInterval, isScanning = false;
        let userData = { ip: '127.0.0.1', isp: 'LOCALHOST' };

        const dom = {
            btn: document.getElementById('main-btn'), res: document.getElementById('results'),
            acc: document.getElementById('accuracy'), sig: document.getElementById('signal'),
            jit: document.getElementById('val-jit'), bet: document.getElementById('val-bet'),
            log: document.getElementById('log'), tdisp: document.getElementById('timer-display'),
            bank: document.getElementById('bank'), prov: document.getElementById('prov'),
            gateway: document.getElementById('gateway'), url: document.getElementById('game-url'),
            load: document.getElementById('val-load'), bBox: document.getElementById('break-box'),
            scan: document.getElementById('scan-bar'), net: document.getElementById('net-display'),
            vMan: document.getElementById('val-manuais'), vNor: document.getElementById('val-normais'),
            vTur: document.getElementById('val-turbos'), inputCiclo: document.getElementById('ciclo-manual')
        };

        function addLog(text, color = "#a1a1aa") {
            const l = document.createElement('div');
            l.innerHTML = `<span style="color:#3f3f46">[${new Date().toLocaleTimeString().split(' ')[0]}]</span> <span style="color:${color}">${text}</span>`;
            dom.log.appendChild(l); dom.log.scrollTop = dom.log.scrollHeight;
        }

        async function initSystem() {
            addLog("Titanium Engine Inicializada. Pronto para auditoria.", "#00f2ff");
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                userData.ip = data.ip; userData.isp = data.org;
                dom.net.innerText = `${userData.isp} | PROTECTED ROUTE`;
            } catch(e) { addLog("Modo offline ativado. Usando seed local.", "#ffcc00"); }
            atualizarGatewayPorURL();
        }

        function atualizarGatewayPorURL() {
            const urlInput = dom.url.value.trim();
            if (urlInput) {
                try {
                    const parsed = new URL(urlInput);
                    dom.gateway.value = parsed.origin;
                    addLog(`Host de auditoria definido: ${parsed.hostname}`);
                } catch (e) { dom.gateway.value = "ERRO DE SINTAXE"; }
            } else {
                dom.gateway.value = dom.prov.value === "PG" ? "https://m.pg-nmga.com" : "https://static.pragmaticplay.net";
            }
        }

        function registrarFeedback(tipo) {
            if (isScanning) return;
            const ciclo = parseInt(dom.inputCiclo.value) || (tipo === 0 ? 0 : 1);
            sessionData.push({ tipo, ciclo, time: Date.now() });
            if(sessionData.length > 50) sessionData.shift();
            localStorage.setItem('v60_titanium', JSON.stringify(sessionData));
            addLog(`Feedback quantitativo registrado [${tipo === 0 ? 'RETENÇÃO' : 'PAYOUT'}].`, tipo > 0 ? "#10b981" : "#ef4444");
            dom.inputCiclo.value = "";
        }

        async function iniciarTitaniumAudit() {
            const banca = parseFloat(dom.bank.value);
            if(!banca || banca < 1) return addLog("Aviso: Capital inválido para cálculo de Kelly.", "#ef4444");
            if(dom.gateway.value === "ERRO DE SINTAXE") return addLog("Aviso: Corrija a URL alvo.", "#ef4444");

            isScanning = true; dom.btn.disabled = true;
            dom.btn.innerText = "PROCESSANDO VARIÂNCIA...";
            dom.res.classList.add('hidden');
            dom.scan.style.width = "100%"; dom.scan.style.transition = "width 3s ease-out";

            // 1. Amostragem Refinada (Drop Outliers)
            let pings = [];
            for (let i = 0; i < 15; i++) {
                let t0 = performance.now();
                await fetch(`${dom.gateway.value}/favicon.ico?hash=${Math.random().toString(36).substring(7)}`, { mode: 'no-cors', cache: 'no-store' }).catch(() => {});
                pings.push(performance.now() - t0);
            }
            pings.sort((a, b) => a - b);
            pings.pop(); pings.shift(); // Remove maior e menor latência

            const media = pings.reduce((a,b) => a+b) / pings.length;
            const jitter = pings[pings.length - 1] - pings[0];
            
            // 2. Análise Histórica Recente (Penalidade por Retenção)
            const ultimos5 = sessionData.slice(-5);
            let penalidade = 0;
            ultimos5.forEach(d => { if(d.tipo === 0) penalidade += 5; }); // Perde 5% de precisão por cada loss recente
            
            const accuracy = Math.max(10.5, Math.min(99.2, 100 - (jitter * 0.4) - (media / 30) - penalidade));

            // 3. Geração Hash SHA-256 (Determinístico)
            const seed = `${userData.ip}-${Math.floor(Date.now()/120000)}-${jitter}`;
            const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(seed));
            const h = new Uint8Array(hashBuffer);

            // 4. Lógica de Sinais Adaptativa
            const wins = sessionData.filter(d => d.tipo > 0);
            const avgCycle = wins.length > 0 ? wins.reduce((a,b) => a+b.ciclo, 0) / wins.length : 3;
            
            const manuais = jitter > 40 ? Math.ceil(jitter / 15) : 0;
            const n = (h[0] % 6) + Math.max(2, Math.floor(avgCycle));
            const t = (h[1] % 5) + 3;

            // 5. Gestão Kelly Strict (Conservadora)
            const kelly = ((accuracy/100) * 2 - 1) * 0.12; 
            const betRecomendada = banca * Math.max(0.005, kelly); // Sugere bets menores em instabilidade

            setTimeout(() => {
                dom.scan.style.transition = "none"; dom.scan.style.width = "0%";
                
                // Preenchendo a interface
                dom.acc.innerText = accuracy.toFixed(1) + "%";
                dom.sig.innerText = `${n}N+${t}T`;
                dom.jit.innerText = jitter.toFixed(1) + "ms";
                dom.bet.innerText = "R$ " + (betRecomendada < 0.4 ? 0.4 : betRecomendada).toFixed(2);
                
                dom.vMan.innerText = manuais;
                dom.vNor.innerText = n;
                dom.vTur.innerText = t;

                const liquidezAlta = jitter < 45 && penalidade < 15;
                dom.load.innerText = liquidezAlta ? "FLUXO ABERTO" : "RETENÇÃO";
                dom.load.style.color = liquidezAlta ? "#00f2ff" : "#ef4444";
                
                dom.bBox.classList.toggle('hidden', manuais === 0);

                dom.res.classList.remove('hidden');
                dom.btn.disabled = false;
                dom.btn.innerText = "ANÁLISE QUANTITATIVA";
                
                const timerSecs = liquidezAlta ? 300 : 180 + (penalidade * 10);
                startNeuralTimer(timerSecs);
                
                addLog(`Auditoria Finalizada. Média: ${media.toFixed(1)}ms | Penalidade Histórica: ${penalidade}%`, "#fff");
                addLog(`ESTRATÉGIA: Execute 1 ÚNICO CICLO de N+T e aguarde o timer.`, "#ffcc00");
                isScanning = false;
            }, 2500);
        }

        function startNeuralTimer(duration) {
            clearInterval(timerInterval);
            let timer = duration;
            dom.tdisp.style.color = "#27272a";
            
            timerInterval = setInterval(() => {
                let m = parseInt(timer / 60, 10), s = parseInt(timer % 60, 10);
                dom.tdisp.innerText = `${m < 10 ? "0"+m : m}:${s < 10 ? "0"+s : s}`;
                
                if(timer < 60) dom.tdisp.style.color = "#ef4444"; // Fica vermelho no último minuto
                
                if (--timer < 0) {
                    clearInterval(timerInterval);
                    dom.tdisp.innerText = "00:00";
                    dom.tdisp.style.color = "#27272a";
                    addLog("Janela de oportunidade fechada. Pronto para nova varredura.", "#00f2ff");
                }
            }, 1000);
        }
    </script>
</body>
                                                          </html>
